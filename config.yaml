# ──────────────────────────────────────────────────────────────────────────────
# Photogrammetry Pipeline — config.yaml
# All tunable parameters in one place.
# ──────────────────────────────────────────────────────────────────────────────

# Output directory structure
# Paths are relative to the working directory, or to --output if supplied.
paths:
  output_root: output
  stage1_dir:  01_rembg
  stage2_dir:  02_normalized
  stage3_dir:  03_model
  stage4_dir:  04_enhanced


# ── Stage 1: Background Removal ───────────────────────────────────────────────
rembg:
  # Model weights to use for background removal.
  # Options: u2net | u2net_human_seg | u2netp | isnet-general-use | silueta
  model: u2net


# ── Stage 2: Exposure Normalization ───────────────────────────────────────────
normalization:
  # Target CIE L* brightness (0–255 on OpenCV's 8-bit LAB scale).
  # Set to null to auto-compute from the dataset mean (recommended).
  target_brightness: null

  # CLAHE contrast limit. Higher = stronger local contrast enhancement.
  clahe_clip_limit: 2.0

  # CLAHE tile grid size [cols, rows]. Smaller tiles = finer local adaptation.
  clahe_tile_size: [8, 8]


# ── Stage 3: Metashape Reconstruction ─────────────────────────────────────────
metashape:
  # Base name for the .psx project file and exported .obj
  project_name: reconstruction

  # Photo matching accuracy.
  # Options: HighestAccuracy | HighAccuracy | MediumAccuracy | LowAccuracy | LowestAccuracy
  # Higher accuracy = longer processing time and more RAM/VRAM usage.
  match_accuracy: HighAccuracy

  # Depth map quality (downscale factor applied to input images).
  # 1 = Highest (full res)  2 = High  4 = Medium  8 = Low
  depth_map_downscale: 2

  # Texture atlas size in pixels. Power-of-2 values are recommended.
  # 4096 works well for most objects; use 8192 for large/detailed subjects.
  texture_size: 4096

  # Number of texture atlases to generate. Increase for complex models
  # where a single atlas would be too low-resolution.
  texture_count: 1

  # Mesh cleanup: remove disconnected components with fewer than this many
  # polygons. Eliminates floating artifacts from photogrammetry noise.
  # Set to 0 to disable. The main subject typically has tens of thousands
  # of polygons; floaters are usually in the tens-to-hundreds range.
  min_component_size: 2500


# ── Stage 4: Texture Enhancement (Real-ESRGAN) ────────────────────────────────
realesrgan:
  # Model weights to use.
  # RealESRGAN_x4plus  — general-purpose, best for photographic/photogrammetry textures
  # RealESRGAN_x4plus_anime_6B — lighter model, suited to illustrated/stylised surfaces
  model_name: RealESRGAN_x4plus

  # Output scale factor relative to the input texture size.
  # 1 = same resolution (denoise/sharpen in-place, recommended for 4096 atlases)
  # 4 = upscale 4× (e.g. 4096 → 16384; produces larger files)
  outscale: 1

  # Tile size for processing. Large textures are split into tiles to stay within
  # VRAM limits. 512 is safe for 8 GB cards; increase to 1024 if you have headroom.
  tile: 512

  # Overlap padding between tiles (pixels). Prevents visible seams at tile edges.
  tile_pad: 10

  # Use fp16 half-precision on CUDA. Faster and uses less VRAM; negligible quality loss.
  half: true
